<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>404 · Not Found</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    html, body {
      margin: 0; padding: 0;
      width: 100%; height: 100%;
      overflow: hidden;
      background: #090a0f;
      font-family: ui-sans-serif, system-ui, sans-serif;
    }

    .bg {
      position: fixed; inset: 0;
      background: radial-gradient(ellipse at bottom, #1b2735 0%, #090a0f 100%);
      overflow: hidden;
    }

    /* Stars */
    #s1, #s2, #s3 { position: absolute; top: 0; left: 0; }

    #s1 {
      width: 1px; height: 1px; background: transparent;
      box-shadow: 501px 811px #fff, 1450px 1324px #fff, 404px 975px #fff,
                  732px 1420px #fff, 1290px 340px #fff, 1678px 1820px #fff;
      animation: drift 50s linear infinite;
    }
    #s1::after { content: ""; position: absolute; top: 2000px; width: 1px; height: 1px; box-shadow: inherit; }

    #s2 {
      width: 2px; height: 2px; background: transparent;
      box-shadow: 1925px 1320px #fff, 693px 1778px #fff, 939px 1922px #fff,
                  120px 640px #fff, 1530px 980px #fff, 845px 420px #fff;
      animation: drift 100s linear infinite;
    }
    #s2::after { content: ""; position: absolute; top: 2000px; width: 2px; height: 2px; box-shadow: inherit; }

    #s3 {
      width: 3px; height: 3px; background: transparent;
      box-shadow: 200px 981px #fff, 1731px 521px #fff, 1888px 1547px #fff,
                  1024px 256px #fff, 620px 1440px #fff, 1600px 720px #fff;
      animation: drift 150s linear infinite;
    }
    #s3::after { content: ""; position: absolute; top: 2000px; width: 3px; height: 3px; box-shadow: inherit; }

    @keyframes drift {
      from { transform: translateY(0); }
      to   { transform: translateY(-2000px); }
    }

    /* Center content */
    .center {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      z-index: 10; gap: 16px;
    }

    .num {
      font-size: 80px;
      letter-spacing: 14px;
      background: linear-gradient(white, #38495a);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      opacity: 0;
      transform: translateY(30px);
      animation: up 1.2s ease-out forwards;
    }

    @keyframes up { to { opacity: 1; transform: translateY(0); } }

    .glitch {
      position: relative;
      font-size: 22px;
      font-weight: 700;
      color: #fff;
      letter-spacing: 5px;
      animation: skew 1s ease-in-out infinite alternate;
    }
    .glitch::before,
    .glitch::after {
      content: attr(data-text);
      position: absolute; top: 0; left: 0; opacity: 0.8;
    }
    .glitch::before { color: #8b00ff; animation: jitter 0.4s infinite; z-index: -1; }
    .glitch::after  { color: #00e571; animation: jitter 0.4s infinite reverse; z-index: -2; }

    @keyframes jitter {
      0%  { transform: translate(0); }
      20% { transform: translate(-3px, 3px); }
      40% { transform: translate(-3px, -3px); }
      60% { transform: translate(3px, 3px); }
      80% { transform: translate(3px, -3px); }
      100%{ transform: translate(0); }
    }
    @keyframes skew {
      0%, 100% { transform: skewX(0deg); }
      50%       { transform: skewX(-10deg); }
    }

    .back {
      margin-top: 8px;
      color: rgba(255,255,255,0.55);
      font-size: 14px;
      text-decoration: none;
      border-bottom: 1px dashed rgba(255,255,255,0.3);
    }
    .back:hover { color: #fff; }
  </style>
</head>
<body>
  <div class="bg" aria-hidden="true">
    <div id="s1"></div>
    <div id="s2"></div>
    <div id="s3"></div>
  </div>
  <div class="center">
    <div class="num">404</div>
    <div class="glitch" data-text="NOT FOUND">NOT FOUND</div>
    <a class="back" href="/">← Go home</a>
  </div>
</body>
</html>
