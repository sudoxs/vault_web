# =========================
# Site Config — edit these or run: python3 setup.py
# =========================

title:       "sudoxs"
tagline:     "Security Research Vault"
description: "A quiet archive of security research, write-ups, and tools."
author:      "sudoxs"

url:         "https://sudoxs.github.io"
baseurl:     "/sudoxs_web"

github_url:  "https://github.com/sudoxs"

# Folder where your markdown and files live
content_dir: "content"

# Search engine crawling
robots: "index, follow"

markdown: kramdown
plugins:  []

exclude:
  - README.md
  - .gitignore
  - Gemfile
  - Gemfile.lock
  - vendor
  - _site
  - .jekyll-cache
  - setup.py
  - "*.example"
  - project_dump.txt
  - dump_project.sh
